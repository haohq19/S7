# @package _global_
# Walker2D — paper Table 11 row.
# Depth=1 H=100 Dropout=0.21 P=32 J=16 (block_size=2) LR=3.7e-5 WD=0.085 Epochs=100 B=60

task:
  name: walker-classification

model:
  ssm_init:
    C_init: lecun_normal
    dt_min: 0.001
    dt_max: 0.1
    conj_sym: false
    clip_eigs: true
    input_dependent: true
    stablessm_a: false
    log_a: false
    bidirectional: false
  ssm:
    discretization: zoh
    d_model: 100
    d_ssm: 32
    ssm_block_size: 2
    num_stages: 1
    num_layers_per_stage: 1
    dropout: 0.21
    classification_mode: none
    prenorm: true
    batchnorm: true
    bn_momentum: 0.95
    pooling_stride: 1
    pooling_mode: last
    state_expansion_factor: 1
    encoder_type: dense

training:
  num_epochs: 100
  per_device_batch_size: 60
  per_device_eval_batch_size: 60
  num_workers: 2
  cut_mix: 0.0
  pad_unit: 2048
  no_time_information: false
  loss_type: mse

optimizer:
  ssm_base_lr: 3.7e-5
  lr_factor: 2
  warmup_epochs: 1
  ssm_weight_decay: 0.085
  weight_decay: 0.085
  proj_weight_decay: 0.085
  schedule: cosine
  accumulation_steps: 1
