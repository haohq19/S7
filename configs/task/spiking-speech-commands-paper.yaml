# @package _global_
# SSC — paper Table 11 row.
# Depth=8 H=32 Dropout=0.25 P=32 J=4 (block_size=8) LR=1.1e-5 WD=0.004 Epochs=200 B=8

task:
  name: ssc-classification

model:
  ssm_init:
    C_init: lecun_normal
    dt_min: 0.0015
    dt_max: 0.1
    conj_sym: true
    clip_eigs: true
    input_dependent: true
    stablessm_a: true
    log_a: false
    bidirectional: false
  ssm:
    discretization: async
    d_model: 32
    d_ssm: 32
    ssm_block_size: 8
    num_stages: 2
    num_layers_per_stage: 4
    dropout: 0.25
    classification_mode: pool
    prenorm: true
    batchnorm: true
    bn_momentum: 0.95
    pooling_stride: 8
    pooling_mode: timepool
    state_expansion_factor: 1
    encoder_type: embed

training:
  num_epochs: 200
  per_device_batch_size: 8
  per_device_eval_batch_size: 8
  num_workers: 2
  time_jitter: 3
  spatial_jitter: 1.0
  noise: 100
  drop_event: 0.1
  max_drop_chunk: 0.02
  cut_mix: 0.3
  time_skew: 1.05
  pad_unit: 8192
  loss_type: cross_entropy

optimizer:
  ssm_base_lr: 1.1e-5
  lr_factor: 5
  warmup_epochs: 20
  ssm_weight_decay: 0.004
  weight_decay: 0.004
  proj_weight_decay: 0.004
  schedule: cosine
  accumulation_steps: 1
