# @package _global_
# EigenWorms — paper Table 11 row.
# Depth=1 H=16 Dropout=0.03 P=14 J=7 (block_size=2) LR=5.6e-5 WD=0.044 Epochs=900 B=12

task:
  name: eigenworms-classification

model:
  ssm_init:
    C_init: lecun_normal
    dt_min: 0.001
    dt_max: 0.1
    conj_sym: false
    clip_eigs: true
    input_dependent: true
    stablessm_a: false
    log_a: false
    bidirectional: false
  ssm:
    discretization: zoh
    d_model: 16
    d_ssm: 14
    ssm_block_size: 2
    num_stages: 1
    num_layers_per_stage: 1
    dropout: 0.03
    classification_mode: pool
    prenorm: true
    batchnorm: true
    bn_momentum: 0.95
    pooling_stride: 1
    pooling_mode: last
    state_expansion_factor: 1
    encoder_type: dense

training:
  num_epochs: 900
  per_device_batch_size: 12
  per_device_eval_batch_size: 12
  num_workers: 2
  cut_mix: 0.0
  pad_unit: 17984
  no_time_information: true
  loss_type: cross_entropy

optimizer:
  ssm_base_lr: 5.6e-5
  lr_factor: 2
  warmup_epochs: 1
  ssm_weight_decay: 0.044
  weight_decay: 0.044
  proj_weight_decay: 0.044
  schedule: cosine
  accumulation_steps: 1
