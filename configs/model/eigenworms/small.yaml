# @package _global_

model:
  ssm_init:
    C_init: lecun_normal
    dt_min: 0.001
    dt_max: 0.1
    conj_sym: false
    clip_eigs: true
    input_dependent: true
    stablessm_a: false
    log_a: false
    bidirectional: false
  ssm:
    discretization: zoh
    d_model: 36
    d_ssm: 8
    ssm_block_size: 4
    num_stages: 1
    num_layers_per_stage: 1
    dropout: 0.19493287684529745
    classification_mode: pool
    prenorm: true
    batchnorm: true
    bn_momentum: 0.95
    pooling_stride: 1
    pooling_mode: last
    state_expansion_factor: 1
    encoder_type: dense
